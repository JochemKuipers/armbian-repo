name: Build Armbian kernel & publish apt repo

on:
  workflow_dispatch: # manual trigger

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Build kernel with Armbian action
        uses: armbian/build@v26.2.0-trunk.589
        with:
          armbian_board: ${{ secrets.ARMBIAN_BOARD }}
          armbian_kernel_branch: current
          armbian_release: trixie
          armbian_artifacts: build/output/debs/
          armbian_compress: false
          armbian_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install reprepro
        run: sudo apt-get install -y reprepro gnupg

      - name: Import GPG signing key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Remove previous kernel packages from repo
        run: |
          set -e
          for pkg in linux-headers-current-rockchip64 \
                     linux-image-current-rockchip64 \
                     linux-dtb-current-rockchip64; do
            echo "Removing package '$pkg' from codename 'trixie' (if present)..."
            reprepro -b . remove trixie "$pkg" || true
          done

      - name: Add .debs to reprepro
        run: |
          for deb in build/output/debs/linux-headers-current-*.deb \
                     build/output/debs/linux-image-current-*.deb \
                     build/output/debs/linux-dtb-current-*.deb; do
            if [ -f "$deb" ]; then
              reprepro -b . includedeb trixie "$deb"
            fi
          done

      - name: Export GPG public key
        run: |
          mkdir -p pubkey
          gpg --export -a "MyArmbian Repo <repo@myarmbian.local>" > pubkey/myarmbian-repo.asc

      - name: Commit and push repo changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A . ':!build' ':!custom' ':!os'
          git commit -m "Kernel build $(date +%Y-%m-%d)" || echo "Nothing to commit"
          if git rev-parse --abbrev-ref --symbolic-full-name @{u} >/dev/null 2>&1; then
            git push
          else
            echo "No upstream branch configured; skipping git push"
          fi

  deploy-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: "."
      - uses: actions/deploy-pages@v4
        id: deployment
