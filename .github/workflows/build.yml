name: Build Armbian kernel & publish apt repo

on:
  workflow_dispatch: # manual trigger

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Build kernel with Armbian action
        uses: armbian/build@v26.2.0-trunk.589
        with:
          board: ${{ secrets.ARMBIAN_BOARD }}
          branch: current
          release: trixie
          artifacts: kernel
          install-headers: yes
          compress-output-image: no
          build-minimal: yes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install reprepro
        run: sudo apt-get install -y reprepro gnupg

      - name: Import GPG signing key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Add .debs to reprepro
        run: |
          for deb in output/debs/linux-headers-current-*.deb \
                     output/debs/linux-image-current-*.deb \
                     output/debs/linux-dtb-current-*.deb; do
            [ -f "$deb" ] && reprepro -b . includedeb trixie "$deb"
          done

      - name: Commit and push repo changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Kernel build $(date +%Y-%m-%d)" || echo "Nothing to commit"
          git push

  deploy-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: "."
      - uses: actions/deploy-pages@v4
        id: deployment
